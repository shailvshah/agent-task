name: 💡 Feature Request
description: Suggest an idea or feature for agent.task
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your interest in improving `agent.task`! 
        Note: If this proposes a change to the schema itself, it will require an ADR (Architecture Decision Record) before implementation.
  
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem? Please describe.
      description: A clear and concise description of what the problem is.
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.

  - type: dropdown
    id: scope
    attributes:
      label: What is the scope of this feature?
      options:
        - CLI Tooling (TypeScript)
        - CLI Tooling (Python)
        - Schema Change (Requires ADR)
        - Enterprise Agent Examples
        - Other
    validations:
      required: true
