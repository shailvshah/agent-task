name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── TypeScript ────────────────────────────────────────────────────────
  typescript:
    name: TypeScript CLI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli-ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/cli-ts/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

  # ── Python ────────────────────────────────────────────────────────────
  python:
    name: Python CLI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli-py
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: latest
      - run: uv sync --all-extras
      - run: uv run ruff check src/
      - run: uv run mypy src/
      - run: uv run pytest tests/ -v

  # ── Shared fixture equivalence ────────────────────────────────────────
  equivalence:
    name: Behavioural equivalence
    runs-on: ubuntu-latest
    needs: [typescript, python]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: astral-sh/setup-uv@v3
      - run: npm ci --prefix packages/cli-ts
      - run: npm run build --prefix packages/cli-ts
      - run: cd packages/cli-py && uv sync
      - name: Run equivalence tests
        run: |
          for fixture in tests/fixtures/valid/*.agent.task; do
            echo "Testing: $fixture"
            ts_out=$(node packages/cli-ts/dist/cli/index.js validate "$fixture" --json)
            py_out=$(uv run --directory packages/cli-py agent-task validate "$fixture" --json)
            if [ "$ts_out" != "$py_out" ]; then
              echo "DIVERGENCE on $fixture"
              echo "TS: $ts_out"
              echo "PY: $py_out"
              exit 1
            fi
          done
          echo "All fixtures pass equivalence check"

  # ── Schema validation ─────────────────────────────────────────────────
  schema:
    name: JSON Schema lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g ajv-cli ajv-formats
      - run: ajv compile -s spec/v0.1.json -c ajv-formats
      - name: Validate all examples
        run: |
          for f in examples/*.agent.task; do
            echo "Validating $f"
            cp "$f" "$f.json"
            ajv validate -s spec/v0.1.json -d "$f.json" -c ajv-formats
            rm "$f.json"
          done
